global:
  scrape_interval: 15s

alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - "alertmanager:9093"

rule_files:
  - "alert_rules.yml"

scrape_configs:
  - job_name: 'waterflow2'
    static_configs:
      - targets:
          - 'api:8000'
    metrics_path: '/metrics'
