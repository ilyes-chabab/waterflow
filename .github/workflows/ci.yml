name: CI

on:
  push:
  pull_request:

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: "pip"
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Validate raw data (schema / missing values)
        run: python scripts/validate_data.py

      - name: Run tests (with coverage)
        run: python -m pytest --cov --cov-report=term-missing --cov-report=xml

      - name: Train & validate model (F1-score gate)
        run: python scripts/validate_model.py

      - name: Build API Docker image (packaging)
        run: docker build -t waterflow2-api:${{ github.sha }} .

      - name: Build full docker-compose stack (mlflow + api + streamlit)
        run: docker compose build

  delivery:
    name: Livraison continue (packaging + publication de l'image)
    needs: ci
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push API image (livraison)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository }}-api:${{ github.sha }}
            ghcr.io/${{ github.repository }}-api:latest

      - name: Build and push Streamlit UI image (livraison)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ui.Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository }}-ui:${{ github.sha }}
            ghcr.io/${{ github.repository }}-ui:latest